<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!--  Google Font  -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Sora', sans-serif; }

    /* // Simple fade-in animation for new task cards */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card { animation: fadeInUp 0.3s ease forwards; }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!--  NAVBAR -->
  <nav class="sticky top-0 z-50 bg-indigo-700 shadow-md">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center gap-3">
      <span class="text-2xl">📚</span>
      <span class="text-white text-xl font-bold tracking-wide">Student Task Tracker</span>
    </div>
  </nav>


  <!-- HERO SECTION-->
  <header class="bg-gradient-to-br from-indigo-600 to-violet-500 text-white py-14 px-6 text-center">
    <h1 class="text-4xl font-bold mb-3">Stay On Top Of Your Work </h1>
    <p class="text-indigo-100 text-lg max-w-xl mx-auto">
      Add your assignments, projects, and deadlines. Never miss a due date again.
    </p>
  </header>
<!--  TASK ENTRY FORM -->
  <main class="max-w-4xl mx-auto px-6 py-10">

    <section class="bg-white rounded-2xl shadow-md p-8 mb-10">
      <h2 class="text-2xl font-semibold mb-6 text-indigo-700">* Add a New Task</h2>

      <div
        id="error-msg"
        class="hidden mb-5 bg-red-100 border border-red-400 text-red-700 rounded-lg px-4 py-3 text-sm"
      >
        NOTE: Please fill in <strong>both</strong> the task name and a due date before submitting.
      </div>

      <div class="flex flex-col sm:flex-row gap-4">

        <input
          id="task-input"
          type="text"
          placeholder="e.g. Finish HTML assignment"
          class="flex-1 border border-slate-300 rounded-xl px-4 py-3
                 focus:outline-none focus:ring-2 focus:ring-indigo-400
                 text-slate-700 placeholder-slate-400"
        />

        <!-- Due date picker -->
        <input
          id="date-input"
          type="date"
          class="border border-slate-300 rounded-xl px-4 py-3
                 focus:outline-none focus:ring-2 focus:ring-indigo-400
                 text-slate-700"
        />

        <!-- Submit button -->
        <button
          id="add-btn"
          class="bg-indigo-600 hover:bg-indigo-700 active:scale-95
                 text-white font-semibold px-6 py-3 rounded-xl
                 transition-all duration-150 whitespace-nowrap"
        >
          Add Task
        </button>

      </div>
    </section>

</body>
</html>
